$kind: http-request
url: "{{authBaseUrl}}{{loginPath}}"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: text
  content: |-
    {
      "email": "{{invalidEmail}}",
      "password": "{{invalidPassword}}"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('N1 status is 200/400/401', function () {
      pm.expect(pm.response.code).to.be.oneOf([200, 400, 401]); });

      let json = {};

      try { json = pm.response.json(); } catch (e) {}

      pm.test('N1 login rejected by API contract', function () {
        const failed = (json.isSuccess === false) || (json.success === false) || (json.token == null);
        pm.expect(failed).to.equal(true);
      });
    language: text/javascript
order: 1000
