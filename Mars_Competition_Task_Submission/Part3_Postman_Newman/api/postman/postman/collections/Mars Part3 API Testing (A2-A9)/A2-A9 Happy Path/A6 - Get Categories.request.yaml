$kind: http-request
url: "{{listingBaseUrl}}{{getCategoriesPath}}"
method: GET
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{authToken}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('A6 status is 200', function () { pm.response.to.have.status(200);
      });

      let json = {};

      try { json = pm.response.json(); } catch (e) {}

      pm.test('A6 body is object/array', function () { pm.expect(['object',
      'array']).to.include(typeof json); });
    language: text/javascript
order: 5000
