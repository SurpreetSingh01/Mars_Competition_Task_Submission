$kind: http-request
url: "{{profileBaseUrl}}{{addCertificationPath}}"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{authToken}}
body:
  type: text
  content: |-
    {
      "certificationName": "{{certificateName}}",
      "certificationFrom": "{{certificateFrom}}",
      "certificationYear": "{{certificateYear}}"
    }
scripts:
  - type: afterResponse
    code: pm.test('A5 status is 200/201', function () {
      pm.expect(pm.response.code).to.be.oneOf([200, 201]); });
    language: text/javascript
order: 4000
