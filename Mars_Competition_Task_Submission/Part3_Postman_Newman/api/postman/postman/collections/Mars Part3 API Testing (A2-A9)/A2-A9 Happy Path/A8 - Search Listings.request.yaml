$kind: http-request
url: "{{listingBaseUrl}}{{searchListingsPath}}"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
  Authorization: Bearer {{authToken}}
body:
  type: text
  content: |-
    {
      "terms": {
        "searchString": "{{searchTerm}}"
      },
      "sortPagination": {
        "offset": 0,
        "limit": 10
      }
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test('A8 status is 200', function () { pm.response.to.have.status(200);
      });

      let json = {};

      try { json = pm.response.json(); } catch (e) {}

      pm.test('A8 response is object/array', function () { pm.expect(['object',
      'array']).to.include(typeof json); });
    language: text/javascript
order: 7000
